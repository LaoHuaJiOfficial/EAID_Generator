name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'src/BF1Bundle.txt'
      - 'src/BF4Bundle.txt'
      - 'src/BF1&4Bundle.txt'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync bundle files to docs
        run: |
          mkdir -p docs/bundles
          cp src/BF1Bundle.txt docs/bundles/
          cp src/BF4Bundle.txt docs/bundles/
          cp "src/BF1&4Bundle.txt" docs/bundles/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
